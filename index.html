<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Tam Quốc Audio - Gọn gàng trên di động</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #7a4a1e 0%, #4a2a0e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            padding: 12px;
        }

        /* Container chính - bo góc mềm, không gian thoáng */
        .player-container {
            max-width: 1000px;
            width: 100%;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25), 0 2px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        /* Header nhẹ nhàng */
        .player-header {
            background: #FEF7E6;
            padding: 14px 20px;
            border-bottom: 1px solid #f0e2c5;
        }

        .player-header h1 {
            font-size: 1.35rem;
            font-weight: 600;
            color: #7b3f00;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header-badge {
            background: #c28a4e;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            color: #fff7e8;
            white-space: nowrap;
        }

        /* Khu vực đang phát - tối giản */
        .now-playing-area {
            background: #fafaf5;
            padding: 16px 20px;
            border-bottom: 1px solid #eee5d8;
        }

        .track-info {
            margin-bottom: 14px;
        }

        .track-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #5a2e0e;
            background: #fff2df;
            display: inline-block;
            padding: 5px 16px;
            border-radius: 32px;
            letter-spacing: -0.2px;
            max-width: 100%;
            word-break: break-word;
            box-shadow: inset 0 0 0 1px #ffe0b5, 0 1px 3px rgba(0,0,0,0.02);
        }

        /* Controls: gọn trên mobile, linh hoạt */
        .audio-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin: 12px 0 8px;
        }

        .playback-buttons {
            display: flex;
            gap: 12px;
            background: #ffffff;
            padding: 4px 12px;
            border-radius: 60px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .ctrl-btn {
            background: transparent;
            border: none;
            font-size: 1.8rem;
            cursor: pointer;
            color: #8b5a2b;
            transition: 0.2s;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .ctrl-btn:active {
            background: #f0e0c0;
            transform: scale(0.94);
        }

        /* Group loop và volume gọn hơn */
        .loop-group {
            display: flex;
            gap: 8px;
            background: #ffffff;
            padding: 4px 12px;
            border-radius: 60px;
            align-items: center;
        }

        .loop-btn {
            background: #f4f0ea;
            border: none;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            color: #5a3e24;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            touch-action: manipulation;
        }

        .loop-btn.active {
            background: #0066cc;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 102, 204, 0.3);
        }

        .volume-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #ffffff;
            padding: 4px 14px;
            border-radius: 60px;
        }

        .volume-icon {
            font-size: 1.2rem;
            color: #8b5a2b;
        }

        input[type="range"] {
            width: 100px;
            height: 4px;
            -webkit-appearance: none;
            background: #ddd2c0;
            border-radius: 4px;
        }

        input[type="range"]:focus {
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #b46f30;
            cursor: pointer;
            border: 2px solid #fff0dd;
        }

        /* Progress bar */
        .progress-section {
            margin: 12px 0 4px;
        }

        .progress-bar-bg {
            background: #e0cfba;
            border-radius: 20px;
            height: 6px;
            width: 100%;
            cursor: pointer;
            position: relative;
        }

        .progress-fill {
            background: #0066cc;
            width: 0%;
            height: 6px;
            border-radius: 20px;
            transition: width 0.05s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.7rem;
            color: #a2642c;
            font-weight: 500;
        }

        /* PLAYLIST - thiết kế gọn, dễ chạm */
        .playlist-section {
            background: #ffffff;
            padding: 12px 16px 20px 16px;
        }

        .playlist-title {
            font-size: 1rem;
            font-weight: 600;
            color: #7b3f00;
            margin-bottom: 10px;
            padding-left: 8px;
            border-left: 4px solid #c28a4e;
        }

        .playlist-scroll {
            max-height: 380px;
            overflow-y: auto;
            border-radius: 28px;
            background: #fef9f0;
            padding: 6px 4px;
            scrollbar-width: thin;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            margin: 5px 4px;
            background: #ffffff;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #f1e2cf;
            touch-action: manipulation;
        }

        .playlist-item:active {
            background: #f7efdf;
            transform: scale(0.99);
        }

        .playlist-item.active-track {
            background: #0066cc;
            border-color: #004c99;
            color: white;
            box-shadow: 0 3px 8px rgba(0, 102, 204, 0.2);
        }

        .track-name {
            font-size: 0.88rem;
            font-weight: 500;
            color: #3e2a1b;
            letter-spacing: -0.2px;
            /* Ẩn phần mở rộng .m4a bằng js, nhưng css cũng hỗ trợ fallback */
            word-break: break-word;
            flex: 1;
        }

        .active-track .track-name {
            color: white;
            font-weight: 500;
        }

        .track-duration {
            font-size: 0.65rem;
            background: #efe2d0;
            padding: 2px 8px;
            border-radius: 30px;
            color: #7b4a1e;
            margin-left: 10px;
            white-space: nowrap;
        }

        .active-track .track-duration {
            background: rgba(255, 255, 255, 0.25);
            color: white;
        }

        /* Scrollbar nhẹ */
        .playlist-scroll::-webkit-scrollbar {
            width: 4px;
        }
        .playlist-scroll::-webkit-scrollbar-track {
            background: #f0e3d4;
            border-radius: 10px;
        }
        .playlist-scroll::-webkit-scrollbar-thumb {
            background: #c28a4e;
            border-radius: 10px;
        }

        footer {
            background: #FEF7E6;
            padding: 8px 16px;
            font-size: 0.6rem;
            color: #aa7942;
            text-align: center;
            border-top: 1px solid #f0e2cd;
        }

        /* Responsive mobile tinh gọn */
        @media (max-width: 640px) {
            body {
                padding: 8px;
            }
            .player-container {
                border-radius: 28px;
            }
            .player-header h1 {
                font-size: 1.15rem;
            }
            .track-title {
                font-size: 1rem;
                padding: 4px 14px;
            }
            .audio-controls {
                gap: 8px;
                justify-content: center;
            }
            .playback-buttons {
                gap: 8px;
                padding: 2px 10px;
            }
            .ctrl-btn {
                width: 40px;
                height: 40px;
                font-size: 1.6rem;
            }
            .loop-btn {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
            .volume-wrap {
                padding: 2px 12px;
                gap: 6px;
            }
            input[type="range"] {
                width: 80px;
            }
            .playlist-item {
                padding: 8px 12px;
            }
            .track-name {
                font-size: 0.82rem;
            }
            .playlist-scroll {
                max-height: 340px;
            }
        }

        @media (max-width: 480px) {
            .loop-group {
                order: 2;
                width: auto;
            }
            .volume-wrap {
                order: 3;
            }
            .playback-buttons {
                order: 1;
            }
            .audio-controls {
                flex-wrap: wrap;
                justify-content: space-evenly;
            }
            .track-title {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="player-header">
        <h1>
            🎧 Tam Quốc Diễn Nghĩa
            <span class="header-badge">120 hồi âm thanh</span>
        </h1>
    </div>

    <div class="now-playing-area">
        <div class="track-info">
            <div class="track-title" id="currentTrackName">Tam Quốc 001</div>
        </div>

        <div class="audio-controls">
            <div class="playback-buttons">
                <button class="ctrl-btn" id="prevBtn" aria-label="Bài trước">⏮</button>
                <button class="ctrl-btn" id="playPauseBtn" aria-label="Phát / Dừng">▶</button>
                <button class="ctrl-btn" id="nextBtn" aria-label="Bài tiếp">⏭</button>
            </div>

            <div class="loop-group">
                <button id="loopOneBtn" class="loop-btn" aria-label="Lặp một bài">🔂 1</button>
                <button id="loopAllBtn" class="loop-btn active" aria-label="Lặp tất cả">🔁 Tất cả</button>
            </div>

            <div class="volume-wrap">
                <span class="volume-icon">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.75">
                <span id="volumePercent" style="min-width: 38px; font-size: 0.7rem; color:#8b5a2b;">75%</span>
            </div>
        </div>

        <div class="progress-section">
            <div class="progress-bar-bg" id="progressBarBg">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-info">
                <span id="currentTimeDisplay">0:00</span>
                <span id="durationDisplay">0:00</span>
            </div>
        </div>
    </div>

    <div class="playlist-section">
        <div class="playlist-scroll" id="playlistContainer">
            <!-- Danh sách phát tự động tạo, tên file sẽ được làm sạch đuôi .m4a -->
        </div>
    </div>
    <footer>🎵 Tam Quốc | Nhấn vào bài để nghe | Lặp 1 / Tất cả</footer>
</div>

<script>
    // ======================= DANH SÁCH FILE GỐC (CÓ ĐUÔI .M4A) =======================
    const fileNamesRaw = [
        "Tam Quoc 001.m4a", "Tam Quoc 002.m4a", "Tam Quoc 003.m4a", "Tam Quoc 004.m4a", "Tam Quoc 005.m4a",
        "Tam Quoc 006.m4a", "Tam Quoc 007.m4a", "Tam Quoc 008.m4a", "Tam Quoc 009.m4a", "Tam Quoc 010.m4a",
        "Tam Quoc 011.m4a", "Tam Quoc 012.m4a", "Tam Quoc 013.m4a", "Tam Quoc 014.m4a", "Tam Quoc 015.m4a",
        "Tam Quoc 016.m4a", "Tam Quoc 017.m4a", "Tam Quoc 018.m4a", "Tam Quoc 019.m4a", "Tam Quoc 020.m4a",
        "Tam Quoc 021.m4a", "Tam Quoc 022.m4a", "Tam Quoc 023.m4a", "Tam Quoc 024.m4a", "Tam Quoc 025.m4a",
        "Tam Quoc 026.m4a", "Tam Quoc 027.m4a", "Tam Quoc 028.m4a", "Tam Quoc 029.m4a", "Tam Quoc 030.m4a",
        "Tam Quoc 031.m4a", "Tam Quoc 032.m4a", "Tam Quoc 033.m4a", "Tam Quoc 034.m4a", "Tam Quoc 035.m4a",
        "Tam Quoc 036.m4a", "Tam Quoc 037.m4a", "Tam Quoc 038.m4a", "Tam Quoc 039.m4a", "Tam Quoc 040.m4a",
        "Tam Quoc 041.m4a", "Tam Quoc 042.m4a", "Tam Quoc 043.m4a", "Tam Quoc 044.m4a", "Tam Quoc 045.m4a",
        "Tam Quoc 046.m4a", "Tam Quoc 047.m4a", "Tam Quoc 048.m4a", "Tam Quoc 049.m4a", "Tam Quoc 050.m4a",
        "Tam Quoc 051.m4a", "Tam Quoc 052.m4a", "Tam Quoc 053.m4a", "Tam Quoc 054.m4a", "Tam Quoc 055.m4a",
        "Tam Quoc 056.m4a", "Tam Quoc 057.m4a", "Tam Quoc 058.m4a", "Tam Quoc 059.m4a", "Tam Quoc 060.m4a",
        "Tam Quoc 061.m4a", "Tam Quoc 062.m4a", "Tam Quoc 063.m4a", "Tam Quoc 064.m4a", "Tam Quoc 065.m4a",
        "Tam Quoc 066.m4a", "Tam Quoc 067.m4a", "Tam Quoc 068.m4a", "Tam Quoc 069.m4a", "Tam Quoc 070.m4a",
        "Tam Quoc 071.m4a", "Tam Quoc 072.m4a", "Tam Quoc 073.m4a", "Tam Quoc 074.m4a", "Tam Quoc 075.m4a",
        "Tam Quoc 076.m4a", "Tam Quoc 077.m4a", "Tam Quoc 078.m4a", "Tam Quoc 079.m4a", "Tam Quoc 080.m4a",
        "Tam Quoc 081.m4a", "Tam Quoc 082.m4a", "Tam Quoc 083.m4a", "Tam Quoc 084.m4a", "Tam Quoc 085.m4a",
        "Tam Quoc 086.m4a", "Tam Quoc 087.m4a", "Tam Quoc 088.m4a", "Tam Quoc 089.m4a", "Tam Quoc 090.m4a",
        "Tam Quoc 091.m4a", "Tam Quoc 092.m4a", "Tam Quoc 093.m4a", "Tam Quoc 094.m4a", "Tam Quoc 095.m4a",
        "Tam Quoc 096.m4a", "Tam Quoc 097.m4a", "Tam Quoc 098.m4a", "Tam Quoc 099.m4a", "Tam Quoc 100.m4a",
        "Tam Quoc 101.m4a", "Tam Quoc 102.m4a", "Tam Quoc 103.m4a", "Tam Quoc 104.m4a", "Tam Quoc 105.m4a",
        "Tam Quoc 106.m4a", "Tam Quoc 107.m4a", "Tam Quoc 108.m4a", "Tam Quoc 109.m4a", "Tam Quoc 110.m4a",
        "Tam Quoc 111.m4a", "Tam Quoc 112.m4a", "Tam Quoc 113.m4a", "Tam Quoc 114.m4a", "Tam Quoc 115.m4a",
        "Tam Quoc 116.m4a", "Tam Quoc 117.m4a", "Tam Quoc 118.m4a", "Tam Quoc 119.m4a", "Tam Quoc 120 end.m4a"
    ];

    // Hàm làm sạch tên hiển thị: loại bỏ đuôi .m4a, đồng thời xử lý "120 end" -> "120" cho đẹp
    function cleanDisplayName(rawName) {
        let nameWithoutExt = rawName.replace(/\.m4a$/i, '');
        // Nếu có " end" thì xóa (cho file cuối)
        nameWithoutExt = nameWithoutExt.replace(/\s+end$/i, '');
        return nameWithoutExt;
    }

    // Đường dẫn audio: cùng thư mục với file HTML (có thể chỉnh BASE_URL nếu cần)
    const BASE_URL = "";  // để trống => lấy từ cùng thư mục

    // Tạo playlist với tên hiển thị sạch, giữ nguyên URL gốc (có đuôi .m4a)
    const playlist = fileNamesRaw.map(name => ({
        rawName: name,
        displayName: cleanDisplayName(name),
        url: BASE_URL + encodeURI(name)
    }));

    // DOM elements
    const audio = new Audio();
    let currentTrackIndex = 0;
    let isPlaying = false;
    let loopMode = "all"; // "all" hoặc "one"

    const playPauseBtn = document.getElementById("playPauseBtn");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const loopOneBtn = document.getElementById("loopOneBtn");
    const loopAllBtn = document.getElementById("loopAllBtn");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumePercentSpan = document.getElementById("volumePercent");
    const progressFill = document.getElementById("progressFill");
    const progressBarBg = document.getElementById("progressBarBg");
    const currentTimeDisplay = document.getElementById("currentTimeDisplay");
    const durationDisplay = document.getElementById("durationDisplay");
    const currentTrackNameSpan = document.getElementById("currentTrackName");
    const playlistContainer = document.getElementById("playlistContainer");

    // Helper format time
    function formatTime(seconds) {
        if (isNaN(seconds) || seconds === Infinity) return "0:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }

    // Cập nhật active trong playlist và tên hiển thị
    function updatePlaylistActive() {
        const items = document.querySelectorAll(".playlist-item");
        items.forEach((item, idx) => {
            if (idx === currentTrackIndex) {
                item.classList.add("active-track");
                item.scrollIntoView({ behavior: "smooth", block: "nearest" });
            } else {
                item.classList.remove("active-track");
            }
        });
        // Hiển thị tên bài không có đuôi .m4a
        currentTrackNameSpan.textContent = playlist[currentTrackIndex].displayName;
    }

    // Tải bài hát theo chỉ số
    function loadTrack(index) {
        if (index < 0) index = 0;
        if (index >= playlist.length) index = playlist.length - 1;
        currentTrackIndex = index;
        const track = playlist[currentTrackIndex];
        audio.src = track.url;
        audio.load();
        updatePlaylistActive();
        // Reset progress
        progressFill.style.width = "0%";
        currentTimeDisplay.textContent = "0:00";
        durationDisplay.textContent = "0:00";
        
        // Nếu đang ở trạng thái playing, tự động phát
        if (isPlaying) {
            const playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.catch(e => {
                    console.warn("Auto play bị chặn: ", e);
                    isPlaying = false;
                    playPauseBtn.textContent = "▶";
                });
            }
        }
    }

    // Phát / tạm dừng
    function togglePlayPause() {
        if (!audio.src || audio.paused) {
            if (!audio.src) {
                loadTrack(currentTrackIndex);
            }
            audio.play().then(() => {
                isPlaying = true;
                playPauseBtn.textContent = "⏸";
            }).catch(err => {
                console.log("play error", err);
                isPlaying = false;
                playPauseBtn.textContent = "▶";
            });
        } else {
            audio.pause();
            isPlaying = false;
            playPauseBtn.textContent = "▶";
        }
    }

    // Bài tiếp theo (xử lý loop mode gọn)
    function nextTrack() {
        if (playlist.length === 0) return;
        let newIndex = currentTrackIndex + 1;
        if (newIndex >= playlist.length) {
            if (loopMode === "all") {
                newIndex = 0;
            } else {
                // Loop one: không tự chuyển khi hết danh sách, giữ nguyên
                return;
            }
        }
        if (newIndex < playlist.length) {
            currentTrackIndex = newIndex;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log(e));
            }
        }
    }

    // Bài trước
    function prevTrack() {
        if (playlist.length === 0) return;
        let newIndex = currentTrackIndex - 1;
        if (newIndex < 0) {
            if (loopMode === "all") {
                newIndex = playlist.length - 1;
            } else {
                return;
            }
        }
        currentTrackIndex = newIndex;
        loadTrack(currentTrackIndex);
        if (isPlaying) {
            audio.play().catch(e => console.log(e));
        }
    }

    // Cập nhật giao diện nút loop
    function updateLoopUI() {
        if (loopMode === "one") {
            loopOneBtn.classList.add("active");
            loopAllBtn.classList.remove("active");
        } else {
            loopOneBtn.classList.remove("active");
            loopAllBtn.classList.add("active");
        }
    }

    // Xử lý kết thúc bài
    function onTrackEnded() {
        if (loopMode === "one") {
            // Lặp lại bài hiện tại
            audio.currentTime = 0;
            audio.play().catch(e => console.log("Lặp lại lỗi", e));
        } else { // loop all
            let nextIdx = currentTrackIndex + 1;
            if (nextIdx >= playlist.length) {
                nextIdx = 0;
            }
            currentTrackIndex = nextIdx;
            loadTrack(currentTrackIndex);
            if (isPlaying) {
                audio.play().catch(e => console.log("Auto play next", e));
            } else {
                playPauseBtn.textContent = "▶";
                isPlaying = false;
            }
        }
    }

    // Volume
    function setVolume(value) {
        audio.volume = value;
        volumeSlider.value = value;
        const percent = Math.round(value * 100);
        volumePercentSpan.textContent = `${percent}%`;
    }

    // Cập nhật progress
    function updateProgress() {
        if (audio.duration && !isNaN(audio.duration)) {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = `${percent}%`;
            currentTimeDisplay.textContent = formatTime(audio.currentTime);
            durationDisplay.textContent = formatTime(audio.duration);
        } else {
            currentTimeDisplay.textContent = formatTime(audio.currentTime);
            if (audio.duration && !isNaN(audio.duration)) 
                durationDisplay.textContent = formatTime(audio.duration);
        }
    }

    // Seek khi click vào thanh progress
    function seek(e) {
        const rect = progressBarBg.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        if (width > 0 && audio.duration && !isNaN(audio.duration)) {
            const seekTime = (clickX / width) * audio.duration;
            audio.currentTime = seekTime;
        }
    }

    // Render danh sách phát với tên đã được làm sạch (không hiện .m4a)
    function renderPlaylist() {
        playlistContainer.innerHTML = "";
        playlist.forEach((track, idx) => {
            const itemDiv = document.createElement("div");
            itemDiv.classList.add("playlist-item");
            if (idx === currentTrackIndex) itemDiv.classList.add("active-track");
            
            const nameSpan = document.createElement("span");
            nameSpan.className = "track-name";
            // HIỂN THỊ TÊN KHÔNG CÓ ĐUÔI .M4A
            nameSpan.textContent = track.displayName;
            
            const durationSpan = document.createElement("span");
            durationSpan.className = "track-duration";
            durationSpan.textContent = "⏺";
            
            itemDiv.appendChild(nameSpan);
            itemDiv.appendChild(durationSpan);
            
            itemDiv.addEventListener("click", (e) => {
                e.stopPropagation();
                if (currentTrackIndex !== idx) {
                    currentTrackIndex = idx;
                    loadTrack(currentTrackIndex);
                    // Tự động phát khi chọn bài mới (tăng trải nghiệm)
                    if (isPlaying) {
                        audio.play().catch(e => console.log(e));
                    } else {
                        // Nếu đang dừng, tự động phát khi click vào bài khác (tiện lợi)
                        togglePlayPause();
                    }
                } else {
                    // Cùng bài, nếu đang pause thì phát
                    if (audio.paused) {
                        togglePlayPause();
                    }
                }
            });
            playlistContainer.appendChild(itemDiv);
        });
        updatePlaylistActive();
    }
    
    // Cập nhật duration trong playlist sau khi metadata load (cải thiện)
    function updateDurationForCurrentItem() {
        if (audio.duration && !isNaN(audio.duration)) {
            const items = document.querySelectorAll(".playlist-item");
            if (items[currentTrackIndex]) {
                const durSpan = items[currentTrackIndex].querySelector(".track-duration");
                if (durSpan && durSpan.textContent === "⏺") {
                    durSpan.textContent = formatTime(audio.duration);
                }
            }
        }
    }

    // Gắn sự kiện audio
    audio.addEventListener("ended", onTrackEnded);
    audio.addEventListener("timeupdate", updateProgress);
    audio.addEventListener("loadedmetadata", () => {
        durationDisplay.textContent = formatTime(audio.duration);
        updateDurationForCurrentItem();
    });
    audio.addEventListener("canplay", () => {
        if (isPlaying) audio.play().catch(e => console.log("auto play fail"));
    });
    
    // Volume control
    volumeSlider.addEventListener("input", (e) => {
        setVolume(parseFloat(e.target.value));
    });
    
    // Button listeners
    playPauseBtn.addEventListener("click", togglePlayPause);
    prevBtn.addEventListener("click", prevTrack);
    nextBtn.addEventListener("click", nextTrack);
    progressBarBg.addEventListener("click", seek);
    
    loopOneBtn.addEventListener("click", () => {
        loopMode = "one";
        updateLoopUI();
    });
    loopAllBtn.addEventListener("click", () => {
        loopMode = "all";
        updateLoopUI();
    });
    
    // Khởi tạo
    function init() {
        renderPlaylist();
        setVolume(0.75);
        loopMode = "all";
        updateLoopUI();
        currentTrackIndex = 0;
        loadTrack(0);
        isPlaying = false;
        playPauseBtn.textContent = "▶";
        audio.preload = "metadata";
    }
    
    init();
</script>
</body>
</html>
